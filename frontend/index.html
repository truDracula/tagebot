<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$TAGE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .nav-active { color: #2563eb !important; border-bottom: 2px solid #2563eb; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">
    <div id="startup" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-10 text-center">
        <h1 class="text-5xl font-black italic mb-4">$TAGE</h1>
        <div class="w-64 bg-zinc-900 h-1.5 mt-6 overflow-hidden rounded-full mx-auto">
            <div id="progress-bar" class="bg-blue-600 h-full w-0 transition-all duration-300"></div>
        </div>
        <div id="result" class="mt-8 hidden">
            <h2 id="total-reward" class="text-6xl font-black italic mb-6">41,850</h2>
            <button onclick="enterApp()" class="w-full bg-white text-black py-4 rounded-2xl font-black italic uppercase">Claim & Enter</button>
        </div>
    </div>

    <div id="app" class="hidden pb-32">
        <div class="flex justify-between items-center mb-8">
            <div>
                <p id="user-name" class="font-black italic text-lg">@Loading...</p>
                <p id="uid-display" class="text-[10px] text-gray-600 font-bold uppercase">UID: 000000</p>
            </div>
            <div class="glass px-5 py-2 rounded-2xl"><span id="balance" class="text-blue-500 font-black text-xl">0</span></div>
        </div>

        <div id="view-home" class="view-section">
            <div class="glass p-8 rounded-[2.5rem] text-center mb-6">
                <h3 class="font-black italic mb-4 uppercase">Daily Bonus</h3>
                <button onclick="watchAd()" class="w-full bg-blue-600 py-4 rounded-2xl font-black italic">WATCH & EARN +1,000</button>
            </div>
        </div>

        <div id="view-tasks" class="view-section hidden">
            <div class="flex gap-2 mb-6 bg-zinc-900 p-1 rounded-2xl">
                <button onclick="renderTasks('today')" id="btn-today" class="flex-1 py-3 text-[10px] font-black rounded-xl bg-blue-600">TODAY</button>
                <button onclick="renderTasks('partner')" id="btn-partner" class="flex-1 py-3 text-[10px] font-black rounded-xl">PARTNERS</button>
            </div>
            <div id="task-list" class="space-y-3"></div>
        </div>

        <div class="fixed bottom-0 left-0 w-full bg-black border-t border-white/10 flex justify-around p-4 pb-8 z-50">
            <button onclick="showView('home')" id="nav-home" class="nav-active text-[10px] font-black uppercase">Home</button>
            <button onclick="showView('tasks')" id="nav-tasks" class="text-gray-500 text-[10px] font-black uppercase">Tasks</button>
        </div>
    </div>

    <script>
        const API = "https://tagebot-production.up.railway.app";
        let userData = null;
        const taskData = [
            { id: 1, title: "Join $TAGE TG", reward: 5000, type: "today", done: false },
            { id: 2, title: "Follow $TAGE X", reward: 3000, type: "today", done: false },
            { id: 3, title: "Partner Channel", reward: 2500, type: "partner", done: false }
        ];

        function updateUI() {
            if (!userData) return;
            const username = userData.username || "Guest";
            const uid = userData.telegram_id || "000000";
            const points = userData.points || 0;
            document.getElementById('user-name').innerText = "@" + username;
            document.getElementById('uid-display').innerText = "UID: " + uid;
            document.getElementById('balance').innerText = points.toLocaleString();
        }

        function showView(name) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + name).classList.remove('hidden');
            document.querySelectorAll('button[id^="nav-"]').forEach(n => n.classList.remove('nav-active'));
            document.getElementById('nav-' + name).classList.add('nav-active');
            if(name === 'tasks') renderTasks('today');
        }

        function renderTasks(type) {
            document.getElementById('btn-today').classList.toggle('bg-blue-600', type === 'today');
            document.getElementById('btn-partner').classList.toggle('bg-blue-600', type === 'partner');
            
            const list = document.getElementById('task-list');
            const filtered = taskData.filter(t => t.type === type && !t.done);
            list.innerHTML = filtered.map(t => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                    <div><p class="text-xs font-bold uppercase">${t.title}</p><p class="text-blue-500 font-black text-[10px]">+${t.reward}</p></div>
                    <button onclick="completeTask(${t.id})" class="bg-blue-600 text-[9px] px-4 py-1 rounded-lg font-black">GO</button>
                </div>
            `).join('') || '<p class="text-xs text-gray-500">No tasks</p>';
        }

        async function initApp() {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const res = await fetch(`${API}/auth`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    userId: tg.initDataUnsafe.user.id,
                    username: tg.initDataUnsafe.user.username
                })
            });

            userData = await res.json();
            updateUI();

            let p = 0;
            let int = setInterval(() => {
                p++;
                document.getElementById('progress-bar').style.width = p + "%";
                if(p === 100) {
                    clearInterval(int);
                    document.getElementById('result').classList.remove('hidden');
                }
            }, 20);
        }

        async function watchAd() {
            const res = await fetch(`${API}/watch-ad`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    userId: userData.telegram_id
                })
            });

            userData = await res.json();
            updateUI();
        }

        async function completeTask(taskId) {
            const res = await fetch(`${API}/complete-task`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    userId: userData.telegram_id,
                    taskId: taskId
                })
            });

            userData = await res.json();
            const task = taskData.find((t) => t.id === taskId);
            if (task) task.done = true;
            updateUI();
            renderTasks('today');
        }

        function enterApp() {
            document.getElementById('startup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            updateUI();
        }

        initApp();
    </script>
</body>
</html>
