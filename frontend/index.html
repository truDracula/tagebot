<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$TAGE | Elite Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; user-select: none; }
        .glass { background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .nav-active { color: #2563eb !important; border-top: 2px solid #2563eb; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-6">
    <div id="startup" class="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center p-10">
        <h1 class="text-5xl font-black italic mb-4 tracking-tighter">$TAGE</h1>
        <div id="scanner" class="w-full max-w-xs text-center">
            <p id="status" class="text-blue-500 font-bold uppercase text-[10px] tracking-[0.3em]">Verifying Account Age...</p>
            <div class="w-full bg-zinc-900 h-2 mt-6 overflow-hidden rounded-full">
                <div id="progress-bar" class="bg-blue-600 h-full w-0 transition-all"></div>
            </div>
            <div id="result" class="mt-8 hidden">
                <h2 id="total-reward" class="text-6xl font-black italic mb-6">0</h2>
                <button onclick="enterApp()" class="w-full bg-white text-black py-4 rounded-2xl font-black italic uppercase">Claim Drop</button>
            </div>
        </div>
    </div>

    <div id="app" class="hidden pb-32">
        <div class="flex justify-between items-center mb-8 sticky top-0 bg-black/90 py-4 z-40 backdrop-blur-md">
            <div>
                <p id="user-name" class="font-black italic text-lg">@Guest</p>
                <p id="uid-display" class="text-[10px] text-gray-600 font-bold uppercase">UID: 000000</p>
            </div>
            <div class="glass px-5 py-2 rounded-2xl border-blue-500/20">
                <span id="balance" class="text-blue-500 font-black text-xl">0</span>
            </div>
        </div>

        <div id="view-home" class="view-section">
            <div class="glass p-6 rounded-[2.5rem] border border-blue-500/20 mb-8">
                <h3 class="font-black italic text-lg uppercase mb-4">Daily Video</h3>
                <button onclick="watchAd()" id="ad-btn" class="w-full bg-blue-600 py-4 rounded-2xl font-black italic active:scale-95 transition-all">WATCH & EARN +1,000</button>
            </div>
            <div class="glass p-6 rounded-[2.5rem] text-center">
                <h3 class="font-black italic text-lg mb-2 uppercase">Invite Friends</h3>
                <button onclick="inviteFriends()" class="w-full bg-zinc-900 py-4 rounded-2xl font-black italic border border-white/10">SHARE LINK (20%)</button>
            </div>
        </div>

        <div id="view-tasks" class="view-section hidden">
            <div class="flex gap-2 mb-6 bg-zinc-900/50 p-1 rounded-2xl">
                <button onclick="switchTaskTab('today')" class="task-tab-btn flex-1 py-3 text-[10px] font-black rounded-xl bg-blue-600">TODAY</button>
                <button onclick="switchTaskTab('partner')" class="task-tab-btn flex-1 py-3 text-[10px] font-black rounded-xl">PARTNERS</button>
            </div>
            <div id="task-list" class="space-y-3"></div>
        </div>

        <div id="view-leaderboard" class="view-section hidden">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black italic text-xl uppercase text-blue-500">Rankings</h3>
                <button onclick="toggleRankSort()" id="rank-sort-btn" class="text-[8px] font-bold px-3 py-1 rounded-lg bg-zinc-900 uppercase">Old School</button>
            </div>
            <div id="lb-list" class="space-y-3"></div>
        </div>

        <div class="fixed bottom-0 left-0 w-full bg-black border-t border-white/10 flex justify-around p-4 pb-8 z-50 backdrop-blur-xl">
            <button onclick="showView('home')" id="nav-home" class="flex flex-col items-center gap-1 text-gray-600 font-black text-[10px] uppercase nav-active pt-2">Home</button>
            <button onclick="showView('tasks')" id="nav-tasks" class="flex flex-col items-center gap-1 text-gray-600 font-black text-[10px] uppercase pt-2">Tasks</button>
            <button onclick="showView('leaderboard')" id="nav-leaderboard" class="flex flex-col items-center gap-1 text-gray-600 font-black text-[10px] uppercase pt-2">Rank</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let user = { points: 0, account_age_days: 1200 }; // Default values

        function showView(name) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.add('hidden'));
            document.getElementById('view-' + name).classList.remove('hidden');
            
            document.querySelectorAll('[id^="nav-"]').forEach(n => n.classList.remove('nav-active'));
            document.getElementById('nav-' + name).classList.add('nav-active');
            
            if(name === 'tasks') renderTasks('today');
            if(name === 'leaderboard') renderLB('points');
        }

        function enterApp() {
            document.getElementById('startup').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('balance').innerText = (user.account_age_days * 10).toLocaleString();
        }

        // Logic for Task rendering and Leaderboard sorting goes here...
        // (Similar to your test3.html logic but tied to the new showView system)

        // Run Scanner
        let p = 0;
        let int = setInterval(() => {
            p++;
            document.getElementById('progress-bar').style.width = p + "%";
            if(p === 100) {
                clearInterval(int);
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('total-reward').innerText = (user.account_age_days * 10).toLocaleString();
            }
        }, 30);
    </script>
</body>
</html>
