<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>$TAGE | Elite</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#000;color:#fff;font-family:Inter,sans-serif}
.glass{background:rgba(15,15,15,.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08)}
.hidden{display:none}
.nav-active{color:#2563eb;border-top:2px solid #2563eb;padding-top:8px}
</style>
</head>
<body>

<!-- SCANNER -->
<div id="scanner" class="min-h-screen flex flex-col items-center justify-center">
<h1 class="text-4xl font-black italic mb-6">$TAGE</h1>
<p class="text-gray-500 mb-6">Analyzing Telegram seniority...</p>
<div class="w-64 h-2 bg-zinc-800 rounded-full overflow-hidden">
<div id="scanbar" class="h-full bg-blue-600 w-0"></div>
</div>
</div>

<!-- MAIN APP -->
<div id="app" class="hidden pb-28">

<!-- HEADER -->
<div class="p-6 flex justify-between items-center border-b border-white/10">
<div>
<p id="uid" class="text-xs text-gray-500"></p>
<p id="username" class="font-black italic"></p>
</div>
<div class="bg-blue-600/20 px-4 py-2 rounded-xl">
<span id="balance" class="text-blue-500 font-black">0</span>
</div>
</div>

<!-- ADS CARD -->
<div class="p-6 space-y-6">

<div class="glass p-6 rounded-3xl">
<div class="flex justify-between mb-3">
<div>
<p class="text-xs uppercase text-gray-500">Daily Ads</p>
<p class="font-black italic">Watch & Earn</p>
</div>
<div class="text-blue-500 font-black text-lg">
<span id="ads-left">10</span>
</div>
</div>
<p class="text-xs text-gray-500 mb-4">
1,000 $TAGE per ad. Max 10 daily.
</p>
<button onclick="watchAd()" class="w-full bg-blue-600 py-3 rounded-xl font-black">
WATCH AD
</button>
<p class="text-xs text-gray-500 mt-2">
Watched: <span id="ads-watched">0</span>/10
</p>
</div>

<!-- TASKS -->
<div class="glass p-6 rounded-3xl">
<p class="text-xs uppercase text-gray-500 mb-2">Tasks</p>
<div id="task-list" class="space-y-3"></div>
</div>

<!-- LEADERBOARD -->
<div class="glass p-6 rounded-3xl">
<div class="flex justify-between mb-4">
<p class="font-black italic">Leaderboard</p>
<div class="flex gap-4 text-xs font-black">
<span onclick="loadLeaderboard()" class="cursor-pointer text-blue-500">Today</span>
</div>
</div>
<div id="leaderboard-list" class="space-y-2"></div>
</div>

<!-- REFERRALS -->
<div class="glass p-6 rounded-3xl text-center">
<p class="font-black italic mb-2">Invite Friends</p>
<p class="text-xs text-gray-500 mb-4">Earn 20% of friend earnings</p>
<button onclick="invite()" class="w-full bg-blue-600 py-3 rounded-xl font-black">
SHARE LINK
</button>
<div id="referral-list" class="mt-4 space-y-2"></div>
</div>

</div>
</div>

<script>
const API="https://tagebot-production.up.railway.app";
const tg=window.Telegram.WebApp;
let user=null;

function animateScanner(){
let bar=document.getElementById("scanbar");
let width=0;
let interval=setInterval(()=>{
width++;
bar.style.width=width+"%";
if(width>=100){
clearInterval(interval);
initApp();
}
},20);
}

async function initApp(){
tg.ready();tg.expand();
const res=await fetch(`${API}/auth`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
userId:tg.initDataUnsafe.user.id,
username:tg.initDataUnsafe.user.username
})
});
user=await res.json();

document.getElementById("scanner").classList.add("hidden");
document.getElementById("app").classList.remove("hidden");

updateUI();
loadLeaderboard();
loadReferrals();
renderTasks();
}

function updateUI(){
document.getElementById("uid").innerText="UID: "+user.telegram_id;
document.getElementById("username").innerText="@"+user.username;
document.getElementById("balance").innerText=user.points.toLocaleString();
document.getElementById("ads-watched").innerText=user.daily_ads_watched;
document.getElementById("ads-left").innerText=10-user.daily_ads_watched;
}

async function watchAd(){
if(user.daily_ads_watched>=10)return alert("Daily limit reached");
const res=await fetch(`${API}/watch-ad`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId:user.telegram_id})
});
user=await res.json();
updateUI();
}

function renderTasks(){
const tasks=[
{id:1,title:"Follow on X",reward:5000},
{id:2,title:"Join Telegram",reward:3000}
];
const container=document.getElementById("task-list");
container.innerHTML="";
tasks.forEach(t=>{
container.innerHTML+=`
<div class="flex justify-between items-center">
<div>
<p class="font-bold text-sm">${t.title}</p>
<p class="text-blue-500 text-xs">+${t.reward}</p>
</div>
<button onclick="completeTask(${t.id})" class="bg-blue-600 px-4 py-1 rounded-xl text-xs font-black">
CLAIM
</button>
</div>
`;
});
}

async function completeTask(id){
const res=await fetch(`${API}/complete-task`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({userId:user.telegram_id,taskId:id})
});
user=await res.json();
updateUI();
}

async function loadLeaderboard(){
const res=await fetch(`${API}/leaderboard`);
const data=await res.json();
const lb=document.getElementById("leaderboard-list");
lb.innerHTML=data.slice(0,10).map((u,i)=>`
<div class="flex justify-between text-xs">
<span>#${i+1} ${u.username}</span>
<span class="text-blue-500">${u.points}</span>
</div>
`).join("");
}

async function loadReferrals(){
const res=await fetch(`${API}/referrals/${user.telegram_id}`);
const data=await res.json();
const list=document.getElementById("referral-list");
list.innerHTML=data.map(f=>`
<div class="flex justify-between text-xs">
<span>${f.username}</span>
<span class="text-blue-500">${f.points}</span>
</div>
`).join("");
}

function invite(){
const link=`https://t.me/YOUR_BOT_USERNAME?start=${user.telegram_id}`;
tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}`);
}

animateScanner();
</script>
</body>
</html>
